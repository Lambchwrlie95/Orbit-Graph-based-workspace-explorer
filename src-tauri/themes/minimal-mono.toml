name = "Minimal Mono"
author = "Orbit"
version = "1.0"

# Single-color minimalist theme. Every glyph is the same near-white tone —
# variety comes from glyph SHAPE only, not color. Useful when you want the
# graph to read more like a wireframe and less like a candy store.
# Uses Nerd Font glyphs.

[icon.default_file]
text = ""
fg = "#cbd5e1"

[icon.default_dir]
