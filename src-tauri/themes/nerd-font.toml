# This theme uses Nerd Font (https://www.nerdfonts.com/) Private-Use-Area
# glyphs. They render as boxes ("tofu") if you don't have a Nerd Font
# installed AND configured for Orbit's UI font. The glyph palette mirrors
# yazi-rs/yazi defaults so users coming from Yazi feel at home.

