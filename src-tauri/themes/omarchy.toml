name = "Omarchy"
author = "Orbit"
version = "1.0"

# ─── Omarchy-optimized Nerd Font icon theme ────────────────────────────────
#
# Designed for Omarchy / Hyprland on Linux.
# Requires JetBrainsMono Nerd Font (ships with Omarchy by default).
# Colors are drawn from Gruvbox/Omarchy dark palette conventions;
# the accent (red series) echoes the default Omarchy accent.
#
# Glyphs use private-use-area codepoints from nvim-web-devicons / nerd-fonts v3.

[icon.default_file]
text = ""
fg = "#a9b1d6"

[icon.default_dir]
text = ""
fg = "#7aa2f7"

[icon.default_cluster]
text = ""
fg = "#e0af68"

