name = "Material"
author = "Orbit"
version = "1.0"

# A Material-Icon-Theme-flavored palette. Uses Nerd Font glyphs but tints
# them with Material Design's official brand colors for each language. If
# you don't have a Nerd Font, glyphs fall back to symbol-font shapes via
# Orbit's CSS font stack.

